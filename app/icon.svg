<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="vbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b14"/>
      <stop offset="100%" stop-color="#050508"/>
    </linearGradient>
    <linearGradient id="vg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8">
        <animate attributeName="stop-color" values="#818cf8;#6366f1;#4f46e5;#6366f1;#818cf8" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#4f46e5">
        <animate attributeName="stop-color" values="#4f46e5;#818cf8;#6366f1;#818cf8;#4f46e5" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#vbg)"/>
  <!-- Vault door circle -->
  <circle cx="16" cy="17" r="9" fill="none" stroke="url(#vg)" stroke-width="1.8"/>
  <!-- Combination dial spokes -->
  <line x1="16" y1="8.5" x2="16" y2="11" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="25.5" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="7.5" y1="17" x2="10" y2="17" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="22" y1="17" x2="24.5" y2="17" stroke="url(#vg)" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Handle bar -->
  <line x1="16" y1="14" x2="20" y2="17" stroke="url(#vg)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="16" cy="17" r="1.8" fill="url(#vg)"/>
  <!-- Lock shackle top -->
  <path d="M13 10 Q13 7 16 7 Q19 7 19 10" fill="none" stroke="url(#vg)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
