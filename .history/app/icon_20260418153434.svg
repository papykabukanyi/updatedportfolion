<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0d00"/>
      <stop offset="100%" stop-color="#0a0500"/>
    </linearGradient>
    <linearGradient id="amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#f59e0b;#d97706;#f59e0b;#fbbf24" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#d97706">
        <animate attributeName="stop-color" values="#d97706;#b45309;#f59e0b;#b45309;#d97706" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- Shopping bag body -->
  <path d="M9 13h14l-1.5 11H10.5z" fill="none" stroke="url(#amber)" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- Bag handles -->
  <path d="M12 13c0-3 8-3 8 0" fill="none" stroke="url(#amber)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- P letter on bag -->
  <text x="13.5" y="22.5" font-family="Georgia,serif" font-size="7" font-weight="700" fill="url(#amber)">P</text>
</svg>
